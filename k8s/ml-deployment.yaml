apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: finbud
  labels:
    app: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: finbud/ml-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: finbud
spec:
  selector:
    app: ml-service
  ports:
    - port: 8000
      targetPort: 8000
